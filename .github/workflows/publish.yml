name: Publish to GHCR

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cytopipe

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      publish: ${{ steps.decide.outputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read version from pyproject
        id: version
        run: |
          version=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major_minor=${version%.*}" >> "$GITHUB_OUTPUT"

      - name: Decide whether this version needs releasing
        id: decide
        run: |
          version="${{ steps.version.outputs.version }}"
          if [ -n "$(git ls-remote origin "refs/tags/v${version}")" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${version} already exists; nothing to release."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::New version ${version}; will tag and publish."
          fi

  test:
    needs: check
    if: needs.check.outputs.publish == 'true'
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [check, test]
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.check.outputs.version }}
            type=raw,value=${{ needs.check.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Tag the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: gh release create "v${VERSION}" --target "${{ github.sha }}" --generate-notes
